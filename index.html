<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets at Riverdale</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 20px 0 10px;
    }

    #status {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 10px;
      text-align: left;
      background: #fff;
      border: 1px solid #ccc;
      font-family: Arial, sans-serif;
      font-size: 14px;
      white-space: pre-line;
    }

    #map-wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      background: white;
    }

    object {
      width: 100%;
      height: 900px;
      border: none;
      display: block;
    }
  </style>
</head>

<body>
  <h1>Welcome to Inlets at Riverdale</h1>

  <div id="status">Loading map...</div>

  <div id="map-wrap">
    <object id="hoaMap"
            data="./inlets-map-near-final-google.svg?v=3"
            type="image/svg+xml">
    </object>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const svgObject = document.getElementById("hoaMap");

    function log(msg) {
      statusBox.textContent += "\n" + msg;
      console.log(msg);
    }

    statusBox.textContent = "Waiting for SVG...";

    svgObject.addEventListener("load", function () {

      log("SVG loaded.");

      const svgDoc = svgObject.contentDocument;

      if (!svgDoc) {
        log("ERROR: contentDocument is NULL");
        return;
      }

      log("SVG document found.");

      const areas = [
        {
          id: "harbour-walk-the-reserve",
          label: "Harbour Walk The Reserve",
          color: "#1f5cff"
        },
        {
          id: "harbour-walk",
          label: "Harbour Walk",
          color: "#d62828"
        },
        {
          id: "inlets-neighborhood",
          label: "Inlets Neighborhood",
          color: "#1b8f3a"
        }
      ];

      areas.forEach(area => {

        const el = svgDoc.getElementById(area.id);

        if (!el) {
          log("Missing: " + area.id);
          return;
        }

        log("Found: " + area.id);

        el.style.setProperty("pointer-events", "all", "important");
        el.style.setProperty("cursor", "pointer", "important");

        el.style.setProperty("fill", area.color, "important");
        el.style.setProperty("fill-opacity", "0.18", "important");

        el.style.setProperty("stroke", area.color, "important");
        el.style.setProperty("stroke-opacity", "1", "important");
        el.style.setProperty("stroke-width", "1.5", "important");

        el.addEventListener("mouseover", () => {
          log("Hover: " + area.id);

          el.style.setProperty("fill-opacity", "0.40", "important");
          el.style.setProperty("stroke-width", "2.5", "important");
        });

        el.addEventListener("mouseout", () => {
          el.style.setProperty("fill-opacity", "0.18", "important");
          el.style.setProperty("stroke-width", "1.5", "important");
        });

        el.addEventListener("click", () => {
          log("Click: " + area.label);
          alert(area.label);
        });

      });

    });

    svgObject.addEventListener("error", function () {
      log("ERROR: SVG failed to load");
    });
  </script>

</body>
</html>
