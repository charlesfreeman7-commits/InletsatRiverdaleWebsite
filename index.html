<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.wrap {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

svg {
  display: block;
  width: 100%;
  height: 100%;
  max-width: 100vw;
  max-height: 100vh;
}

/* Top-left street name box */
.street-box {
  fill: rgba(31, 122, 77, 0.92);
  stroke: white;
  stroke-width: 1.2;
  rx: 10;
  ry: 10;
}

.street-text {
  fill: white;
  font: 700 20px Arial, sans-serif;
  dominant-baseline: middle;
}

.street-label {
  display: none;
  pointer-events: none;
}

.streetgroup:hover .street-label,
.streetgroup:focus-within .street-label {
  display: block;
}

/* Fully transparent street hover lines */
.street-hit {
  fill: none;
  stroke: rgba(31,122,77,0);
  stroke-width: 20;
  vector-effect: non-scaling-stroke;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: stroke;
  cursor: pointer;
}

/* Hide any old overlay-made shapes */
.preserve,
.facility-dot,
.lift-dot,
.lift-icon,
.boatlift {
  display: none;
}

/* Larger transparent hover targets placed over PNG dots */
.hover-dot {
  fill: rgba(255,255,255,0);
  stroke: rgba(255,255,255,0);
  stroke-width: 34;
  pointer-events: all;
  cursor: pointer;
}

/* Hidden until hover */
.hover-label {
  display: none;
  pointer-events: none;
}

.hover-target:hover .hover-label,
.hover-target:focus-within .hover-label {
  display: block;
}

/* Label styling */
.facility-label rect,
.lift-label rect {
  fill: #1f7a4d;
  stroke: white;
  stroke-width: 1;
  rx: 8;
  ry: 8;
}

.facility-label text {
  fill: white;
  font: 700 14px Arial, sans-serif;
  dominant-baseline: middle;
}

.lift-label text {
  fill: white;
  font: 700 12px Arial, sans-serif;
  dominant-baseline: middle;
}
</style>
</head>
