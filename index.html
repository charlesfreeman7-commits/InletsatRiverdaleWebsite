<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  overflow: hidden;
}

/* Full viewport container */
.wrap {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Scale map to fit screen */
svg {
  display: block;
  width: auto;
  height: 96vh;
  max-width: 96vw;
  max-height: 96vh;
}

/* Top-left street name box */
.street-box {
  fill: rgba(31, 122, 77, 0.92);
  stroke: white;
  stroke-width: 1.2;
  rx: 10;
  ry: 10;
}

.street-text {
  fill: white;
  font: 700 20px Arial, sans-serif;
  dominant-baseline: middle;
}

.street-label {
  display: none;
  pointer-events: none;
}

.streetgroup:hover .street-label {
  display: block;
}

/* Invisible hover lines */
.street-hit {
  fill: none;
  stroke: rgba(0,0,0,0);
  stroke-width: 16;
  pointer-events: stroke;
  cursor: pointer;
}

/* Labels */
.facility-label rect {
  fill: #1f7a4d;
  stroke: white;
  stroke-width: 1;
  rx: 8;
  ry: 8;
}

.facility-label text {
  fill: white;
  font: 700 14px Arial, sans-serif;
}

/* Hide overlay dots/icons */
.facility-dot,
.lift-dot,
.lift-icon {
  display: none;
}

/* Always show boat lift labels */
.lift-label {
  display: block;
  pointer-events: none;
}

.lift-label rect {
  fill: #2e7d32;
  stroke: white;
  rx: 6;
  ry: 6;
}

.lift-label text {
  fill: white;
  font: 700 12px Arial, sans-serif;
}
</style>
</head>

<body>
<div class="wrap">

<svg viewBox="0 0 1600 1580" xmlns="http://www.w3.org/2000/svg">

  <!-- Base image -->
  <image href="./inlets_map.png" x="0" y="0" width="1600" height="1580" />

  <!-- Inlets Preserve -->
  <g class="facility-label">
    <rect x="555" y="76" width="150" height="32"/>
    <text x="567" y="92">Inlets Preserve</text>
  </g>

  <!-- Tennis Court -->
  <g class="facility-label">
    <rect x="609" y="158" width="138" height="32"/>
    <text x="621" y="174">Tennis Court</text>
  </g>

  <!-- Boat Ramp -->
  <g class="facility-label">
    <rect x="305" y="673" width="255" height="32"/>
    <text x="317" y="689">Inlets Community Boat Ramp</text>
  </g>

  <!-- Boat Lift Labels (aligned to PNG dots) -->
  <g class="lift-label"><rect x="318" y="177" width="126" height="28"/><text x="328" y="192">Canal boat lift</text></g>
  <g class="lift-label"><rect x="368" y="211" width="126" height="28"/><text x="378" y="226">Canal boat lift</text></g>
  <g class="lift-label"><rect x="467" y="275" width="126" height="28"/><text x="477" y="290">Canal boat lift</text></g>
  <g class="lift-label"><rect x="435" y="343" width="126" height="28"/><text x="445" y="358">Canal boat lift</text></g>
  <g class="lift-label"><rect x="466" y="377" width="126" height="28"/><text x="476" y="392">Canal boat lift</text></g>
  <g class="lift-label"><rect x="466" y="401" width="126" height="28"/><text x="476" y="416">Canal boat lift</text></g>
  <g class="lift-label"><rect x="504" y="451" width="126" height="28"/><text x="514" y="466">Canal boat lift</text></g>
  <g class="lift-label"><rect x="533" y="536" width="126" height="28"/><text x="543" y="551">Canal boat lift</text></g>
  <g class="lift-label"><rect x="563" y="613" width="126" height="28"/><text x="573" y="628">Canal boat lift</text></g>
  <g class="lift-label"><rect x="552" y="704" width="126" height="28"/><text x="562" y="719">Canal boat lift</text></g>
  <g class="lift-label"><rect x="593" y="794" width="126" height="28"/><text x="603" y="809">Canal boat lift</text></g>

</svg>

</div>
</body>
</html>
