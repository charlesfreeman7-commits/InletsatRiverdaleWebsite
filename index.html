<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>
<style>
  :root{
    --panel-bg: rgba(255,255,255,0.96);
    --panel-border: #cfd8dc;
    --shadow: 0 10px 24px rgba(0,0,0,0.18);
    --hover-blue: rgba(30,136,229,0.06);
    --hover-stroke: rgba(30,136,229,0.22);
  }
  html, body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
  }
  .wrap{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    position:relative;
  }
  .top-instruction{
    text-align:center;
    font-size:16pt;
    font-weight:700;
    color:#1f2933;
    margin:14px 12px 10px 12px;
  }
  .top-link{
    text-align:left;
    margin:0 12px 8px 12px;
  }
  .top-link a{
    color:#1565c0;
    text-decoration:underline;
    font-size:14px;
    font-weight:700;
  }
  svg{
    display:block;
    width:100%;
    height:auto;
    overflow:visible;
    background:#fff;
  }

  .marker{ stroke:#fff; stroke-width:1.5; }
  .marker-yellow{ fill:#ffeb3b; }
  .marker-red{ fill:#c62828; }
  .marker-orange{ fill:#fb8c00; }
  .marker-purple{ fill:#8e24aa; }

  .lift-number{
    font-size:6px;
    font-weight:700;
    fill:#222;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .callout line{ stroke:#37474f; stroke-width:1.4; }
  .callout rect{ rx:7; ry:7; stroke:#fff; stroke-width:1; }
  .callout text{ fill:#fff; font-size:7px; font-weight:700; dominant-baseline:middle; }
  .callout-red rect{ fill:#b71c1c; }
  .callout-orange rect{ fill:#e67e22; }
  .callout-purple rect{ fill:#7b1fa2; }
  .callout-yellow rect{ fill:#7a7600; }

  .legend{
    position:absolute;
    left:12px;
    bottom:12px;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:8px 10px;
    box-shadow:var(--shadow);
    font-size:12px;
    line-height:1.25;
    max-width:235px;
    z-index:20;
  }
  .legend h3{ margin:0 0 6px 0; font-size:13px; }
  .legend-item{ display:flex; align-items:center; gap:7px; margin:4px 0; }
  .dot{
    width:10px; height:10px; border-radius:50%;
    border:1.25px solid #fff;
    box-shadow:0 0 0 1px rgba(0,0,0,0.18);
    flex:0 0 10px;
  }
  .red{ background:#c62828; }
  .orange{ background:#fb8c00; }
  .yellow{ background:#ffeb3b; }
  .purple{ background:#8e24aa; }

  .assoc-piece{
    fill: rgba(30,136,229,0.015);
    stroke: rgba(30,136,229,0.10);
    stroke-width: 1.0;
    cursor: pointer;
    transition: fill .12s ease, stroke .12s ease;
  }
  .assoc-piece:hover,
  .assoc-piece.active{
    fill: var(--hover-blue);
    stroke: var(--hover-stroke);
    stroke-width: 1.2;
  }

  @media (max-width:700px){
    .legend{ position:static; margin:12px; max-width:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-link"><a href="street_names.html" target="_blank" rel="noopener">View Street Names</a></div>

  <div class="legend">
    <h3>Map legend</h3>
    <div class="legend-item"><span class="dot red"></span> Inlets Preserve</div>
    <div class="legend-item"><span class="dot orange"></span> Tennis Courts</div>
    <div class="legend-item"><span class="dot yellow"></span> Canal Boat Lift</div>
    <div class="legend-item"><span class="dot purple"></span> Inlets Community Boat Ramp</div>
  </div>
</div>

<script>
  const pieces = document.querySelectorAll('.assoc-piece');
  pieces.forEach(piece => {
    piece.addEventListener('mouseenter', () => piece.classList.add('active'));
    piece.addEventListener('mouseleave', () => piece.classList.remove('active'));
  });
</script>
</body>
</html>
