<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>
<style>
  :root{
    --panel-bg: rgba(255,255,255,0.96);
    --panel-border: #cfd8dc;
    --shadow: 0 10px 24px rgba(0,0,0,0.18);
    --hover-blue: rgba(30,136,229,0.24);
    --hover-stroke: rgba(30,136,229,0.95);
  }
  html, body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
  }
  .wrap{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    position:relative;
  }
  svg{
    display:block;
    width:100%;
    height:auto;
    overflow:visible;
    background:#fff;
  }

  .marker{ stroke:#fff; stroke-width:1.5; }
  .marker-yellow{ fill:#ffeb3b; }
  .marker-red{ fill:#c62828; }
  .marker-orange{ fill:#fb8c00; }
  .marker-purple{ fill:#8e24aa; }

  .lift-number{
    font-size:6px;
    font-weight:700;
    fill:#222;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .callout line{ stroke:#37474f; stroke-width:1.4; }
  .callout rect{ rx:7; ry:7; stroke:#fff; stroke-width:1; }
  .callout text{ fill:#fff; font-size:7px; font-weight:700; dominant-baseline:middle; }
  .callout-red rect{ fill:#b71c1c; }
  .callout-orange rect{ fill:#e67e22; }
  .callout-purple rect{ fill:#7b1fa2; }
  .callout-yellow rect{ fill:#7a7600; }

  .legend{
    position:absolute;
    left:12px;
    bottom:12px;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:8px 10px;
    box-shadow:var(--shadow);
    font-size:12px;
    line-height:1.25;
    max-width:235px;
    z-index:20;
  }
  .legend h3{ margin:0 0 6px 0; font-size:13px; }
  .legend-item{ display:flex; align-items:center; gap:7px; margin:4px 0; }
  .dot{
    width:10px; height:10px; border-radius:50%;
    border:1.25px solid #fff;
    box-shadow:0 0 0 1px rgba(0,0,0,0.18);
    flex:0 0 10px;
  }
  .red{ background:#c62828; }
  .orange{ background:#fb8c00; }
  .yellow{ background:#ffeb3b; }
  .purple{ background:#8e24aa; }

  .streets-control{
    position:absolute; left:12px; top:12px; z-index:25;
  }
  .streets-button{
    display:inline-block;
    background:rgba(26,115,232,0.95);
    color:#fff;
    padding:8px 12px;
    border-radius:12px;
    font-size:13px;
    font-weight:700;
    box-shadow:var(--shadow);
    cursor:pointer;
    user-select:none;
  }
  .streets-panel{
    display:none;
    margin-top:8px;
    width:min(430px, calc(100vw - 32px));
    max-height:min(76vh, 760px);
    overflow:auto;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:10px;
  }
  .streets-control:hover .streets-panel,
  .streets-control:focus-within .streets-panel{ display:block; }
  .streets-panel h3{ margin:0 0 6px 0; font-size:16px; }
  .streets-panel p{ margin:0 0 8px 0; font-size:12px; color:#37474f; }
  .streets-panel img{
    display:block; width:100%; height:auto;
    border:1px solid #d9e1e5; border-radius:10px;
    margin-bottom:10px; background:#fff;
  }

  .hoa-hover-indicator{
    position:absolute;
    right:12px;
    top:12px;
    z-index:26;
    background:rgba(255,255,255,0.98);
    border:1px solid #b0bec5;
    border-radius:12px;
    box-shadow:var(--shadow);
    padding:8px 12px;
    min-width:150px;
    font-size:13px;
    font-weight:700;
    color:#1f2933;
  }
  .hoa-hover-indicator .label{
    font-size:11px;
    color:#546e7a;
    font-weight:600;
    margin-bottom:2px;
  }

  .assoc-piece{
    fill: rgba(30,136,229,0.04);
    stroke: rgba(30,136,229,0.20);
    stroke-width: 1.15;
    cursor: pointer;
    transition: fill .12s ease, stroke .12s ease;
  }
  .assoc-piece:hover,
  .assoc-piece.active{
    fill: var(--hover-blue);
    stroke: var(--hover-stroke);
    stroke-width: 1.6;
  }

  @media (max-width:700px){
    .legend{ position:static; margin:12px; max-width:none; }
    .streets-control{ position:static; margin:12px; }
    .streets-panel{ width:auto; max-height:none; }
    .hoa-hover-indicator{ position:static; margin:12px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="streets-control" tabindex="0" aria-label="Street names reference">
    <div class="streets-button">Hover here for street names</div>
    <div class="streets-panel">
      <h3>Inlets street-name reference</h3>
      <p>These two reference images are shown on hover for street-name lookup.</p>
      <img src="streets_overview_1.png" alt="Street names reference image 1" />
      <img src="streets_overview_2.png" alt="Street names reference image 2" />
    </div>
  </div>

  <div class="hoa-hover-indicator" id="hoaIndicator">
    <div class="label">HOA hover</div>
    <div id="hoaName">Move over a shaded HOA area</div>
  </div>

  <svg viewBox="0 0 794 741" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-label="Interactive map of The Inlets at Riverdale">
    <image href="inlets_map.png" x="0" y="0" width="794" height="741" preserveAspectRatio="xMidYMid meet" />

    <!-- HOA pieces created from address-grouped street bands -->

    <!-- HARBOUR WALK THE RESERVE -->
    <path class="assoc-piece" data-hoa="Harbour Walk The Reserve" d="M575,94 L703,64 L735,96 L686,118 L588,136 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk The Reserve" d="M563,132 L688,118 L729,149 L681,171 L579,184 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk The Reserve" d="M553,174 L676,173 L722,205 L670,223 L567,227 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk The Reserve" d="M587,136 L594,226 L566,228 L550,210 Z" />

    <!-- HARBOUR WALK -->
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M548,224 L666,224 L714,254 L657,272 L551,274 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M540,270 L651,275 L702,303 L644,321 L539,318 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M532,314 L637,322 L689,350 L628,365 L529,359 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M523,359 L619,367 L675,392 L614,409 L520,402 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M510,402 L604,410 L663,435 L603,450 L513,444 Z" />
    <path class="assoc-piece" data-hoa="Harbour Walk" d="M729,255 L754,350 L734,355 L705,302 L693,255 Z" />

    <!-- RIVERDALE -->
    <path class="assoc-piece" data-hoa="Riverdale" d="M314,465 L443,472 L499,500 L370,516 L320,502 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M434,425 L561,432 L615,457 L486,478 L437,463 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M458,468 L586,476 L640,502 L513,522 L463,507 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M483,511 L610,519 L665,545 L537,565 L487,549 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M509,554 L636,563 L690,588 L563,608 L513,592 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M534,597 L660,606 L711,630 L585,649 L538,635 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M558,638 L681,647 L729,671 L608,689 L563,676 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M383,522 L507,528 L560,553 L436,573 L388,558 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M406,565 L530,572 L583,598 L457,618 L410,603 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M431,609 L553,617 L604,642 L481,660 L436,647 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M252,583 L323,557 L430,564 L409,610 L348,630 L287,617 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M245,536 L309,509 L409,516 L387,560 L330,579 L272,569 Z" />
    <path class="assoc-piece" data-hoa="Riverdale" d="M236,493 L297,468 L392,473 L373,513 L318,531 L260,523 Z" />

    <!-- markers -->
    <circle class="marker marker-red" cx="735" cy="351" r="5.5" />
    <g class="callout callout-red">
      <line x1="728" y1="347" x2="682" y2="324" />
      <rect x="560" y="309" width="88" height="16" />
      <text x="566" y="318">Inlets Preserve</text>
    </g>

    <circle class="marker marker-orange" cx="748" cy="398" r="5.5" />
    <g class="callout callout-orange">
      <line x1="742" y1="396" x2="686" y2="388" />
      <rect x="567" y="379" width="77" height="16" />
      <text x="573" y="388">Tennis Courts</text>
    </g>

    <circle class="marker marker-purple" cx="487" cy="582" r="5.5" />
    <g class="callout callout-purple">
      <line x1="481" y1="580" x2="395" y2="621" />
      <rect x="220" y="613" width="154" height="16" />
      <text x="226" y="622">Inlets Community Boat Ramp</text>
    </g>

    <g>
      <circle class="marker marker-yellow" cx="542" cy="381" r="5.0" /><text class="lift-number" x="542" y="369">1</text>
      <circle class="marker marker-yellow" cx="529" cy="426" r="5.0" /><text class="lift-number" x="529" y="414">2</text>
      <circle class="marker marker-yellow" cx="573" cy="462" r="5.0" /><text class="lift-number" x="573" y="450">3</text>
      <circle class="marker marker-yellow" cx="583" cy="491" r="5.0" /><text class="lift-number" x="583" y="479">4</text>
      <circle class="marker marker-yellow" cx="606" cy="484" r="5.0" /><text class="lift-number" x="606" y="472">5</text>
      <circle class="marker marker-yellow" cx="617" cy="507" r="5.0" /><text class="lift-number" x="617" y="495">6</text>
      <circle class="marker marker-yellow" cx="635" cy="527" r="5.0" /><text class="lift-number" x="635" y="515">7</text>
      <circle class="marker marker-yellow" cx="656" cy="542" r="5.0" /><text class="lift-number" x="656" y="530">8</text>
      <circle class="marker marker-yellow" cx="676" cy="559" r="5.0" /><text class="lift-number" x="676" y="547">9</text>
      <circle class="marker marker-yellow" cx="680" cy="589" r="5.0" /><text class="lift-number" x="680" y="577">10</text>
      <circle class="marker marker-yellow" cx="687" cy="614" r="5.0" /><text class="lift-number" x="687" y="602">11</text>
      <circle class="marker marker-yellow" cx="681" cy="626" r="5.0" /><text class="lift-number" x="681" y="638">12</text>
    </g>

    <g class="callout callout-yellow">
      <line x1="606" y1="484" x2="520" y2="347" />
      <rect x="392" y="333" width="91" height="16" />
      <text x="398" y="342">Canal Boat Lifts</text>
    </g>
  </svg>

  <div class="legend">
    <h3>Map legend</h3>
    <div class="legend-item"><span class="dot red"></span> Inlets Preserve</div>
    <div class="legend-item"><span class="dot orange"></span> Tennis Courts</div>
    <div class="legend-item"><span class="dot yellow"></span> Canal Boat Lift</div>
    <div class="legend-item"><span class="dot purple"></span> Inlets Community Boat Ramp</div>
  </div>
</div>

<script>
  const indicator = document.getElementById('hoaName');
  const pieces = document.querySelectorAll('.assoc-piece');
  const defaultText = 'Move over a shaded HOA area';

  pieces.forEach(piece => {
    piece.addEventListener('mouseenter', () => {
      indicator.textContent = piece.dataset.hoa || defaultText;
      piece.classList.add('active');
    });
    piece.addEventListener('mouseleave', () => {
      piece.classList.remove('active');
      indicator.textContent = defaultText;
    });
  });
</script>
</body>
</html>
