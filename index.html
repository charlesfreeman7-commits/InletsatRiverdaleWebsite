<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets at Riverdale</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 20px 0 10px;
    }

    #map-wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      background: white;
    }

    object {
      width: 100%;
      height: 900px;
      border: none;
      display: block;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Welcome to Inlets at Riverdale</h1>

  <div id="map-wrap">
    <object
      id="hoaMap"
      data="./inlets-map-near-final-google.svg?v=4"
      type="image/svg+xml">
      Your browser does not support SVG.
    </object>
  </div>

  <script>
    const svgObject = document.getElementById("hoaMap");

    svgObject.addEventListener("load", function () {
      const svgDoc = svgObject.contentDocument;
      if (!svgDoc) return;

      const areas = [
        {
          id: "harbour-walk-the-reserve",
          label: "Harbour Walk The Reserve",
          color: "#1f5cff"
        },
        {
          id: "harbour-walk",
          label: "Harbour Walk",
          color: "#d62828"
        },
        {
          id: "inlets-neighborhood",
          label: "Inlets Neighborhood",
          color: "#1b8f3a"
        }
      ];

      areas.forEach(area => {
        const el = svgDoc.getElementById(area.id);
        if (!el) return;

        el.style.setProperty("pointer-events", "all", "important");
        el.style.setProperty("cursor", "pointer", "important");

        el.style.setProperty("fill", area.color, "important");
        el.style.setProperty("fill-opacity", "0.05", "important");

        el.style.setProperty("stroke", area.color, "important");
        el.style.setProperty("stroke-opacity", "0.18", "important");
        el.style.setProperty("stroke-width", "0.4", "important");

        const label =
          svgDoc.getElementById(area.id + "-label") ||
          svgDoc.querySelector('[data-label="' + area.id + '"]');

        if (label) {
          label.style.transition = "transform 0.15s ease, font-size 0.15s ease";
          label.style.transformBox = "fill-box";
          label.style.transformOrigin = "center";
        }

        el.addEventListener("mouseover", () => {
          el.style.setProperty("fill-opacity", "0.30", "important");
          el.style.setProperty("stroke-opacity", "0.9", "important");
          el.style.setProperty("stroke-width", "1.2", "important");

          if (label) {
            label.style.transform = "scale(1.2)";
            label.style.fontWeight = "bold";
          }
        });

        el.addEventListener("mouseout", () => {
          el.style.setProperty("fill-opacity", "0.05", "important");
          el.style.setProperty("stroke-opacity", "0.18", "important");
          el.style.setProperty("stroke-width", "0.4", "important");

          if (label) {
            label.style.transform = "scale(1)";
            label.style.fontWeight = "normal";
          }
        });

        el.addEventListener("click", () => {
          alert(area.label);
        });
      });
    });
  </script>
</body>
</html>
