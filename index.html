<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets Interactive Map</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #dfe7ee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #dfe7ee;
    }

    .map-title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(255,255,255,0.85);
      color: #111;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      pointer-events: none;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #svgHost {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #svgHost svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hover-label {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease-in-out;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.2;
      color: #111;
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(0,0,0,0.18);
      box-shadow: 0 2px 8px rgba(0,0,0,0.14);
      white-space: nowrap;
      z-index: 10;
    }

    .hover-label.show {
      opacity: 1;
    }

    .status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 30;
      background: rgba(255,255,255,0.9);
      color: #333;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="map-title">Move your mouse over the map to identify your homeowner's association</div>

    <div class="map-wrap">
      <div id="svgHost"></div>

      <div id="label-harbour-walk-the-reserve" class="hover-label" style="left: 55%; top: 22%;">Harbour Walk The Reserve</div>
    </div>

    <div id="status" class="status">Loading map…</div>
  </div>

  <script>
    const SVG_FILE = 'https://raw.githubusercontent.com/charlesfreeman7-commits/InletsatRiverdaleWebsite/interactivefiles/InletsMapNearFinal.svg';

    const hoverMap = {
  'harbour-walk-the-reserve': 'label-harbour-walk-the-reserve'
};

    const statusEl = document.getElementById('status');
    const svgHost = document.getElementById('svgHost');

    function showLabel(labelId) {
      const el = document.getElementById(labelId);
      if (el) el.classList.add('show');
    }

    function hideLabel(labelId) {
      const el = document.getElementById(labelId);
      if (el) el.classList.remove('show');
    }

    function prepHoverNode(node) {
      node.style.pointerEvents = 'all';
      node.style.cursor = 'pointer';
      node.style.fill = 'rgba(0,0,0,0)';
      node.style.fillOpacity = '1';
      node.style.stroke = 'none';
      node.style.transition = 'fill 0.12s ease-in-out';
    }

    async function loadSvgInline() {
      try {
        const response = await fetch(SVG_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Could not load ${SVG_FILE}`);

        const svgText = await response.text();
        svgHost.innerHTML = svgText;

        const svg = svgHost.querySelector('svg');
        if (!svg) throw new Error('No <svg> element found in file.');

        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svg.style.width = '100%';
        svg.style.height = '100%';

        let foundCount = 0;

        Object.entries(hoverMap).forEach(([svgId, labelId]) => {
          const node = svg.querySelector(`#${CSS.escape(svgId)}`);
          if (!node) {
            console.warn(`SVG element with id "${svgId}" not found.`);
            return;
          }

          foundCount += 1;
          prepHoverNode(node);

          node.addEventListener('mouseenter', () => {
            node.style.fill = 'rgba(52, 106, 185, 0.20)';
            showLabel(labelId);
          });

          node.addEventListener('mouseleave', () => {
            node.style.fill = 'rgba(0,0,0,0)';
            hideLabel(labelId);
          });
        });

        statusEl.textContent = foundCount
          ? `Map loaded. ${foundCount} hover area(s) connected.`
          : 'Map loaded, but no matching hover IDs were found.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Could not load SVG.';
      }
    }

    loadSvgInline();
  </script>
</body>
</html>
