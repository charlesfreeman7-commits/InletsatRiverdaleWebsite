<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets Interactive Map</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #dfe7ee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #svgHost {
      position: absolute;
      inset: 0;
    }

    #svgHost svg {
      width: 100%;
      height: 100%;
    }

    .hover-label {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 14px;
      z-index: 10;
      white-space: nowrap;
    }

    .hover-label.show {
      opacity: 1;
    }

    /* Hover colors */
    .inlets-neighborhood-hover {
      fill: rgba(173, 216, 230, 0.5); /* Light Blue */
    }

    .harbour-walk-hover {
      fill: rgba(144, 238, 144, 0.5); /* Light Green */
    }

    .harbour-walk-the-reserve-hover {
      fill: rgba(255, 255, 204, 0.5); /* Light Yellow */
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="svgHost"></div>

    <div id="label-harbour-walk-the-reserve" class="hover-label" style="left: 55%; top: 22%;">Harbour Walk The Reserve</div>
    <div id="label-harbour-walk" class="hover-label" style="left: 63%; top: 30%;">Harbour Walk</div>
    <div id="inlets-neighborhood" class="hover-label" style="left: 48%; top: 38%;">Inlets Neighborhood</div>
  </div>

  <script>
    const SVG_FILE = 'InletsMapNearFinal.svg';

    const hoverMap = {
      'harbour-walk-the-reserve': 'label-harbour-walk-the-reserve',
      'harbour-walk': 'label-harbour-walk',
      'inlets-neighborhood': 'inlets-neighborhood'
    };

    const svgHost = document.getElementById('svgHost');

    function showLabel(id) {
      document.getElementById(id)?.classList.add('show');
    }

    function hideLabel(id) {
      document.getElementById(id)?.classList.remove('show');
    }

    function prep(node, hoverClass) {
      node.style.pointerEvents = 'all';
      node.style.cursor = 'pointer';
      node.style.transition = 'fill 0.15s ease';
      node.classList.add(hoverClass); // Add class for hover color change
    }

    fetch(SVG_FILE)
      .then(res => res.text())
      .then(svgText => {
        svgHost.innerHTML = svgText;

        const svg = svgHost.querySelector('svg');

        // Ensure the elements exist and apply the hover effect
        Object.entries(hoverMap).forEach(([id, label]) => {
          const el = svg.querySelector(`#${CSS.escape(id)}`);
          if (!el) {
            console.warn('Missing ID:', id); // Log a warning if the ID doesn't exist
            return;
          }

          let hoverClass;
          switch (id) {
            case 'inlets-neighborhood':
              hoverClass = 'inlets-neighborhood-hover';
              break;
            case 'harbour-walk':
              hoverClass = 'harbour-walk-hover';
              break;
            case 'harbour-walk-the-reserve':
              hoverClass = 'harbour-walk-the-reserve-hover';
              break;
          }

          prep(el, hoverClass);

          el.addEventListener('mouseenter', () => {
            switch (id) {
              case 'inlets-neighborhood':
                el.style.fill = 'rgba(173, 216, 230, 0.5)'; // Light Blue
                break;
              case 'harbour-walk':
                el.style.fill = 'rgba(144, 238, 144, 0.5)'; // Light Green
                break;
              case 'harbour-walk-the-reserve':
                el.style.fill = 'rgba(255, 255, 204, 0.5)'; // Light Yellow
                break;
            }
            showLabel(label);
          });

          el.addEventListener('mouseleave', () => {
            el.style.fill = 'rgba(0,0,0,0)'; // Reset hover color
            hideLabel(label);
          });
        });
      });
  </script>
</body>
</html>
