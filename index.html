<script>
(function(){
  const isTouch = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const svg = document.querySelector('svg');
  if (!svg) return;
  const links = Array.from(svg.querySelectorAll('a[href], a[xlink\\:href]'));

  function clearActive(except){
    links.forEach(a => { if (a !== except) a.classList.remove('active'); });
  }

  if (isTouch){
    links.forEach(a => {
      a.addEventListener('click', function(e){
        if (!a.classList.contains('active')){
          e.preventDefault();
          clearActive(a);
          a.classList.add('active');
          window.clearTimeout(a._t);
          a._t = window.setTimeout(() => a.classList.remove('active'), 2500);
        } else {
          clearActive(a);
        }
      }, {passive:false});
    });
    document.addEventListener('click', (e) => {
      const inside = e.target.closest && e.target.closest('svg a');
      if (!inside) clearActive(null);
    });
  } else {
    links.forEach(a => {
      a.addEventListener('focusin', ()=>{ clearActive(a); a.classList.add('active'); });
      a.addEventListener('focusout', ()=>{ a.classList.remove('active'); });
    });
  }
})();
</script>
