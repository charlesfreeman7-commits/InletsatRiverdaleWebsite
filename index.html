<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
}

.wrap {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}

svg {
  display: block;
  width: 100%;
  height: auto;
}

/* Preserve */
.preserve {
  fill: rgba(76, 175, 80, 0.18);
  stroke: #1f7a4d;
  stroke-width: 2.2;
}

/* Facility markers */
.facility-dot {
  stroke: white;
  stroke-width: 1.5;
}

.facility-label rect {
  fill: #1f7a4d;
  stroke: white;
  stroke-width: 1;
  rx: 8;
  ry: 8;
}

.facility-label text {
  fill: white;
  font-size: 14px;
  font-family: Arial, sans-serif;
  font-weight: 700;
  dominant-baseline: middle;
}

/* Boat lifts */
.lift-dot {
  fill: #2e7d32;
  stroke: white;
  stroke-width: 1.5;
  cursor: pointer;
}

.lift-label {
  display: none;
}

.boatlift:hover .lift-label {
  display: block;
}

.lift-label rect {
  fill: #2e7d32;
  stroke: white;
  stroke-width: 1;
  rx: 6;
  ry: 6;
}

.lift-label text {
  fill: white;
  font-size: 12px;
  font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div class="wrap">

<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">

<!-- 🔑 YOUR REAL MAP IMAGE -->
