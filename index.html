<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
}
.wrap {
  width: 100%;
  max-width: 1600px;
  margin: 0 auto;
}
svg {
  display: block;
  width: 100%;
  height: auto;
}

/* Top-left street name box */
.street-box {
  fill: rgba(31, 122, 77, 0.92);
  stroke: white;
  stroke-width: 1.2;
  rx: 10;
  ry: 10;
}
.street-text {
  fill: white;
  font: 700 20px Arial, sans-serif;
  dominant-baseline: middle;
}
.street-label {
  display: none;
  pointer-events: none;
}
.streetgroup:hover .street-label,
.streetgroup:focus-within .street-label {
  display: block;
}
.street-hit {
  fill: none;
  stroke: rgba(31,122,77,0.01);
  stroke-width: 16;
  vector-effect: non-scaling-stroke;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: stroke;
  cursor: pointer;
}
.streetgroup:hover .street-hit,
.streetgroup:focus-within .street-hit {
  stroke: rgba(31,122,77,0.95);
  stroke-width: 5;
}

/* Preserve */
.preserve {
  fill: rgba(76, 175, 80, 0.18);
  stroke: #1f7a4d;
  stroke-width: 2.2;
}

/* Subtle landmark labels */
.facility-dot {
  stroke: white;
  stroke-width: 1.6;
}
.facility-label rect {
  fill: #1f7a4d;
  stroke: white;
  stroke-width: 1;
  rx: 8;
  ry: 8;
}
.facility-label text {
  fill: white;
  font: 700 14px Arial, sans-serif;
  dominant-baseline: middle;
}

/* Boat lifts */
.lift-dot {
  fill: #2e7d32;
  stroke: white;
  stroke-width: 1.6;
  cursor: pointer;
}
.lift-icon {
  fill: #0e5b37;
  stroke: white;
  stroke-width: 0.8;
  pointer-events: none;
}
.lift-label {
  display: none;
  pointer-events: none;
}
.boatlift:hover .lift-label,
.boatlift:focus-within .lift-label {
  display: block;
}
.lift-label rect {
  fill: #2e7d32;
  stroke: white;
  stroke-width: 1;
  rx: 6;
  ry: 6;
}
.lift-label text {
  fill: white;
  font: 700 12px Arial, sans-serif;
  dominant-baseline: middle;
}
</style>
</head>
<body>
