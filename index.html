<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets at Riverdale</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 20px 0 10px;
    }

    #map-wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    object {
      width: 100%;
      height: 900px;
      border: none;
      display: block;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Welcome to Inlets at Riverdale</h1>

  <div id="map-wrap">
    <object id="hoaMap"
            data="./inlets-map-near-final-google.svg"
            type="image/svg+xml">
      Your browser does not support SVG.
    </object>
  </div>

  <script>
    const svgObject = document.getElementById("hoaMap");

    svgObject.addEventListener("load", function () {
      const svgDoc = svgObject.contentDocument;
      if (!svgDoc) {
        console.log("SVG did not load.");
        return;
      }

      const areas = [
        { id: "harbour-walk", label: "Harbour Walk" },
        { id: "harbour-walk-the-reserve", label: "Harbour Walk The Reserve" },
        { id: "inlets-neighborhood", label: "Inlets Neighborhood" }
      ];

      areas.forEach(area => {
        const el = svgDoc.getElementById(area.id);
        if (!el) {
          console.log("Missing SVG area:", area.id);
          return;
        }

        el.style.cursor = "pointer";
        el.style.fill = "rgba(0, 102, 204, 0.18)";
        el.style.stroke = "rgba(0, 102, 204, 0.65)";
        el.style.strokeWidth = "1";

        el.addEventListener("mouseover", () => {
          el.style.fill = "rgba(255, 140, 0, 0.28)";
          el.style.stroke = "rgba(255, 140, 0, 0.95)";
        });

        el.addEventListener("mouseout", () => {
          el.style.fill = "rgba(0, 102, 204, 0.18)";
          el.style.stroke = "rgba(0, 102, 204, 0.65)";
        });

        el.addEventListener("click", () => {
          alert(area.label);
        });
      });
    });
  </script>
</body>
</html>
