<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets at Riverdale Bradenton Interactive Map</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #dfe7ee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #svgHost {
      position: absolute;
      inset: 0;
    }

    #svgHost svg {
      width: 100%;
      height: 100%;
    }

    .hover-label {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 14px;
      z-index: 10;
      white-space: nowrap;
    }

    .hover-label.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="svgHost"></div>

    <div id="label-harbour-walk-the-reserve" class="hover-label" style="left: 55%; top: 22%;">
      Harbour Walk The Reserve
    </div>

    <div id="label-harbour-walk" class="hover-label" style="left: 63%; top: 30%;">
      Harbour Walk
    </div>

    <div id="inlets-neighborhood" class="hover-label" style="left: 48%; top: 38%;">
      Inlets Neighborhood
    </div>
  </div>

  <script>
    const SVG_FILE = 'InletsMapNearFinal.svg';

    const hoverMap = {
      'harbour-walk-the-reserve': 'label-harbour-walk-the-reserve',
      'harbour-walk': 'label-harbour-walk',
      'inlets-neighborhood': 'inlets-neighborhood'
    };

    const svgHost = document.getElementById('svgHost');

    function showLabel(id) {
      document.getElementById(id)?.classList.add('show');
    }

    function hideLabel(id) {
      document.getElementById(id)?.classList.remove('show');
    }

    function prep(node) {
      node.style.pointerEvents = 'all';
      node.style.cursor = 'pointer';
      node.style.fill = 'rgba(0,0,0,0)';
      node.style.fillOpacity = '1';
      node.style.stroke = 'none';
      node.style.transition = 'fill 0.15s ease';
    }

    fetch(SVG_FILE)
      .then(res => res.text())
      .then(svgText => {
        svgHost.innerHTML = svgText;

        const svg = svgHost.querySelector('svg');

        Object.entries(hoverMap).forEach(([id, label]) => {
          const el = svg.querySelector(`#${CSS.escape(id)}`);
          if (!el) {
            console.warn('Missing ID:', id);
            return;
          }

          prep(el);

          el.addEventListener('mouseenter', () => {
            el.style.fillOpacity = '1';
            el.style.fill = 'rgba(52,106,185,0.25)';
            showLabel(label);
          });

          el.addEventListener('mouseleave', () => {
            el.style.fillOpacity = '1';
            el.style.fill = 'rgba(0,0,0,0)';
            hideLabel(label);
          });
        });
      });
  </script>
</body>
</html>
