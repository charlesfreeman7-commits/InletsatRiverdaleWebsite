<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inlets at Riverdale Interactive Map</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #dfe7ee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #svgHost {
      position: absolute;
      inset: 0;
    }

    #svgHost svg {
      width: 100%;
      height: 100%;
    }

    .hover-label {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 14px;
      z-index: 10;
      white-space: nowrap;
    }

    .hover-label.show {
      opacity: 1;
    }

    /* SVG path styles */
    #inlets-neighborhood {
      transition: opacity 0.15s ease;
    }

    #inlets-neighborhood:hover {
      opacity: 0.7;
    }

    #harbour-walk {
      transition: opacity 0.15s ease;
    }

    #harbour-walk:hover {
      opacity: 0.7;
    }

    #harbour-walk-the-reserve {
      transition: opacity 0.15s ease;
    }

    #harbour-walk-the-reserve:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="svgHost"></div>

    <div id="harbour-walk-the-reserve" class="hover-label" style="left: 55%; top: 22%;">Harbour Walk The Reserve</div>
    <div id="harbour-walk" class="hover-label" style="left: 63%; top: 30%;">Harbour Walk</div>
    <div id="inlets-neighborhood" class="hover-label" style="left: 48%; top: 38%;">Inlets Neighborhood</div>
  </div>

  <script>
    const SVG_FILE = 'inlets-map-near-final.svg';

    const hoverMap = {
      'inlets-neighborhood': 'inlets-neighborhood',
      'harbour-walk': 'harbour-walk',
      'harbour-walk-the-reserve': 'harbour-walk-the-reserve'
    };

    const svgHost = document.getElementById('svgHost');

    function showLabel(id) {
      document.getElementById(id)?.classList.add('show');
    }

    function hideLabel(id) {
      document.getElementById(id)?.classList.remove('show');
    }

    fetch(SVG_FILE)
      .then(res => res.text())
      .then(svgText => {
        svgHost.innerHTML = svgText;

        const svg = svgHost.querySelector('svg');

        // Ensure the elements exist and apply the hover effect
        Object.entries(hoverMap).forEach(([id, label]) => {
          const el = svg.querySelector(`#${CSS.escape(id)}`);
          if (!el) {
            console.warn('Missing ID:', id);
            return;
          }

          el.style.pointerEvents = 'all';
          el.style.cursor = 'pointer';

          el.addEventListener('mouseenter', () => {
            el.style.opacity = '0.7';
            showLabel(label);
          });

          el.addEventListener('mouseleave', () => {
            el.style.opacity = '1';
            hideLabel(label);
          });
        });
      });
  </script>
</body>
</html>
