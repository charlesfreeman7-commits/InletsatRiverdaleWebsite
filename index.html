<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlets at Riverdale</title>
    <style>
        /* Styles for SVG hover effect */
        .hoverable {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Welcome to Inlets at Riverdale</h1>
    <svg width="100" height="100">
        <circle class="hoverable" cx="50" cy="50" r="40" fill="blue"/>
    </svg>
    <script>
        const circle = document.querySelector('.hoverable');
        circle.addEventListener('mouseover', () => {
            circle.setAttribute('fill', 'green');
        });
        circle.addEventListener('mouseout', () => {
            circle.setAttribute('fill', 'blue');
        });
    </script>
</body>
</html>
