<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inlets at Riverdale Interactive Map</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
  }

  .wrap {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
    background: #ffffff;
  }

  .legend-box,
  .street-box,
  .label-box,
  .lift-label {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.30));
  }

  .overlay-panel rect {
    fill: rgba(16, 32, 56, 0.82);
    stroke: rgba(255,255,255,0.65);
    stroke-width: 1.2;
    rx: 10;
    ry: 10;
  }

  .overlay-title {
    fill: #ffffff;
    font-size: 18px;
    font-weight: 700;
  }

  .overlay-text {
    fill: #f7f7f7;
    font-size: 14px;
  }

  .overlay-small {
    fill: #dbe7ff;
    font-size: 12px;
  }

  .facility-dot,
  .lift-dot {
    stroke: #ffffff;
    stroke-width: 2;
  }

  .preserve-dot { fill: #8b0000; }
  .tennis-dot { fill: #ff7f27; }
  .lift-dot { fill: #ffea00; }
  .ramp-dot { fill: #a349a4; }

  .leader {
    stroke: rgba(255,255,255,0.85);
    stroke-width: 1.8;
    fill: none;
  }

  .label-box rect {
    fill: rgba(22, 107, 64, 0.92);
    stroke: #ffffff;
    stroke-width: 1.2;
    rx: 8;
    ry: 8;
  }

  .label-box text {
    fill: #ffffff;
    font-size: 14px;
    font-weight: 700;
    dominant-baseline: middle;
  }

  .boatlift {
    cursor: pointer;
  }

  .lift-label {
    display: none;
  }

  .boatlift:hover .lift-label,
  .boatlift:focus-within .lift-label {
    display: block;
  }

  .lift-label rect {
    fill: rgba(40, 40, 40, 0.92);
    stroke: #ffffff;
    stroke-width: 1;
    rx: 6;
    ry: 6;
  }

  .lift-label text {
    fill: #ffffff;
    font-size: 12px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="wrap">

<!--
  IMPORTANT
  1) Put this file in the same GitHub folder as your revised PNG.
  2) Keep the PNG filename as inlets_map.png or change the href below.
  3) This version is matched to the revised PNG size: 794 x 602.
  4) Street names are placed in the upper-left overlay for legibility.
