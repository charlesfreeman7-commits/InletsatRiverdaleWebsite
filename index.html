<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlets at Riverdale</title>
    <style>
        /* Styles for SVG hover effect */
        .hoverable {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Welcome to Inlets at Riverdale</h1>
    <!-- Link to your new SVG hosted on GitHub -->
    <object data="https://charlesfreeman7-commits.github.io/InletsatRiverdaleWebsite/interactivefiles/inlets-map-near-final-google.svg type="image/svg+xml" width="100%" height="800">
        Your browser does not support SVG.
    </object>

    <script>
        // Example for hover effects (modify as per your new SVG)
        const svg = document.querySelector('object');
        svg.onload = function () {
            const doc = svg.contentDocument;
            const circle = doc.querySelector('.hoverable'); // Make sure you reference the correct element
            circle.addEventListener('mouseover', () => {
                circle.setAttribute('fill', 'green');
            });
            circle.addEventListener('mouseout', () => {
                circle.setAttribute('fill', 'blue');
            });
        };
    </script>
</body>
</html>
